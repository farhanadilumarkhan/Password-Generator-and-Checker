<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="popup-container">
        <header>
            <div class="brand">
                <img src="password_favicon.png" alt="Logo" class="logo">
                <h1>Password Giant</h1>
            </div>
            <p class="privacy-note">🔒 Passwords are processed locally in your browser.</p>
        </header>

        <main>
            <div class="card">
                <label class="section-label">Generate Password</label>
                <div class="input-wrapper">
                    <input type="text" id="generatedPassword" readonly>
                    <button id="copyBtn">Copy</button>
                </div>
                
                <div class="slider-container">
                    <span>Length: <strong id="lengthVal">12</strong></span>
                    <input type="range" id="lengthSlider" min="8" max="50" value="12">
                </div>

                <div class="options-grid">
                    <label class="chip"><input type="checkbox" id="useUpper" checked> ABC</label>
                    <label class="chip"><input type="checkbox" id="useLower" checked> abc</label>
                    <label class="chip"><input type="checkbox" id="useNumbers" checked> 123</label>
                    <label class="chip"><input type="checkbox" id="useSymbols" checked> !@#</label>
                </div>
                <button id="generateBtn" class="primary-btn">Generate New</button>
            </div>

            <div class="card">
                <label class="section-label">Strength Checker</label>
                <div class="input-wrapper">
                    <input type="password" id="checkInput" placeholder="Type password...">
                    <button id="toggleView" class="icon-btn">👁️</button>
                </div>
                <div class="strength-meter">
                    <div id="strengthBar" class="bar"></div>
                </div>
                <div class="status-row">
                    <span id="strengthText">Enter password</span>
                    <span id="crackTime">Crack Time: 0s</span>
                </div>
            </div>
        </main>

        <footer>
            <a href="https://passwordgiant.com" target="_blank">View all 12 tools on PasswordGiant.com →</a>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>
</html>
